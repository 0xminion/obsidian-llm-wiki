name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' ruff pyflakes build
      - name: Static checks
        run: |
          ruff check .
          pyflakes pipeline tests
      - name: Unit and integration-safe tests
        run: pytest -q
      - name: Build wheel
        run: python -m build --wheel --outdir dist
      - name: Wheel install smoke test
        run: |
          python -m venv /tmp/obsidian-wheel-smoke
          /tmp/obsidian-wheel-smoke/bin/pip install dist/*.whl
          /tmp/obsidian-wheel-smoke/bin/pipeline init /tmp/obsidian-wheel-vault --force --quiet
          test -f /tmp/obsidian-wheel-vault/Meta/prompts/batch-create.prompt
          test -f /tmp/obsidian-wheel-vault/Meta/Templates/Entry.md
