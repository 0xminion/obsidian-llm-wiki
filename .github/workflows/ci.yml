name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pdf,docx]"
          pip install trafilatura defusedxml

      - name: Ruff check
        run: ruff check obsidian_llm_wiki tests

      - name: Pytest
        run: python -m pytest tests/ -v --tb=short
        env:
          EMBEDDINGS_ENABLED: "false"

  liteparse-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LiteParse contract dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pdf,docx,liteparse]"

      - name: LiteParse CLI contract
        run: python -m pytest tests/integration/test_liteparse_cli.py -v --tb=short

  obsidian-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm ci

      - name: Typecheck plugin
        run: npm run typecheck

      - name: Test plugin
        run: npm test

      - name: Build plugin
        run: npm run build
