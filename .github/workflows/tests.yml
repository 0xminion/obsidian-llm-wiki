name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax check
        run: |
          python -m py_compile pipeline/utils.py
          python -m py_compile pipeline/config.py
          python -m py_compile pipeline/models.py
          python -m py_compile pipeline/stats.py
          python -m py_compile pipeline/vault.py
          python -m py_compile pipeline/log.py
          python -m py_compile pipeline/language.py
          python -m py_compile pipeline/cli/__init__.py
          python -m py_compile pipeline/cli/_helpers.py
          python -m py_compile pipeline/cli/ingest.py
          python -m py_compile pipeline/cli/compile_cmd.py
          python -m py_compile pipeline/cli/review_cmd.py
          python -m py_compile pipeline/cli/quality.py
          python -m py_compile pipeline/cli/manage.py
          python -m py_compile pipeline/compile/__init__.py
          python -m py_compile pipeline/compile/core.py
          python -m py_compile pipeline/compile/semantic.py
          python -m py_compile pipeline/compile/structural.py
          python -m py_compile pipeline/compile/watch.py
          python -m py_compile pipeline/lint/__init__.py
          python -m py_compile pipeline/lint/checks.py
          python -m py_compile pipeline/lint/fixes.py
          python -m py_compile pipeline/lint/models.py
          python -m py_compile pipeline/lint/runner.py
          python -m py_compile pipeline/create/__init__.py
          python -m py_compile pipeline/create/prompts.py
          python -m py_compile pipeline/create/agent.py
          python -m py_compile pipeline/create/templates.py
          python -m py_compile pipeline/create/validate.py
          python -m py_compile pipeline/create/orchestrator.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=pipeline --cov-report=term-missing
