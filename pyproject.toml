[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "obsidian-llm-wiki"
version = "0.3.0"
description = "Automated PKM vault — Karpathy-style wiki pipeline"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
    "defusedxml>=0.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "tomli>=2.0; python_version < '3.11'",
]

[project.scripts]
pipeline = "pipeline.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["pipeline"]
include = [
    "pipeline/assets/**/*",
]
