[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "obsidian-llm-wiki"
version = "0.1.0"
description = "Automated PKM vault — Karpathy-style wiki pipeline"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[project.scripts]
pipeline = "pipeline.cli:app"
